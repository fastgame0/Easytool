<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyTool Minigame</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white
}

header{
background:linear-gradient(135deg,#2563eb,#06b6d4);
padding:50px;
text-align:center
}

nav{
background:#1e293b;
padding:12px;
text-align:center
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px
}

.game{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center
}

button{
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer
}

canvas{
background:black;
margin-top:10px
}

.cell{
width:45px;
height:45px;
background:#334155;
display:inline-block;
margin:3px;
cursor:pointer
}

.tris{
width:60px;
height:60px;
font-size:30px
}

</style>

</head>

<body>

<header>

<h1>🎮 EasyTool Games</h1>
<p>Divertiti con i giochi online</p>

</header>

<nav>

<a href="index.html">Home</a> <a href="tools.html">Strumenti</a> <a href="minigame.html">Minigame</a>

</nav>

<div class="container">

<!-- SNAKE -->

<div class="game">

<h3>🐍 Snake</h3>

<button onclick="startSnake()">Avvia</button>

<br>

<canvas id="snake" width="200" height="200"></canvas>

</div>

<!-- PACMAN -->

<div class="game">

<h3>👻 Pac-Man</h3>

<button onclick="startPac()">Avvia</button>

<br>

<canvas id="pac" width="200" height="200"></canvas>

</div>

<!-- QUIZ -->

<div class="game">

<h3>❓ Quiz</h3>

<p id="quiz"></p>

<button onclick="quiz()">Domanda</button>

</div>

<!-- NUMERO -->

<div class="game">

<h3>🔢 Indovina Numero</h3>

<input id="guess">

<button onclick="guess()">Prova</button>

<p id="numResult"></p>

</div>

<!-- BATTAGLIA -->

<div class="game">

<h3>🚢 Battaglia Navale</h3>

<div id="grid"></div>

<p id="battle"></p>

</div>

<!-- DADO -->

<div class="game">

<h3>🎲 Lancia il dado</h3>

<button onclick="dice()">Lancia</button>

<p id="dice"></p>

</div>

<!-- TRIS -->

<div class="game">

<h3>❌⭕ Tris</h3>

<div>

<button class="tris" onclick="play(this)"> </button> <button class="tris" onclick="play(this)"> </button> <button class="tris" onclick="play(this)"> </button> <br> <button class="tris" onclick="play(this)"> </button> <button class="tris" onclick="play(this)"> </button> <button class="tris" onclick="play(this)"> </button> <br> <button class="tris" onclick="play(this)"> </button> <button class="tris" onclick="play(this)"> </button> <button class="tris" onclick="play(this)"> </button>

</div>

</div>

<!-- REACTION -->

<div class="game">

<h3>⚡ Test velocità</h3>

<button onclick="reaction()">Clicca quando appare!</button>

<p id="react"></p>

</div>

<!-- PERSONAGGIO -->

<div class="game">

<h3>🧠 Indovina Personaggio</h3>

<button onclick="person()">Indizio</button>

<p id="person"></p>

</div>

<!-- MEMORY -->

<div class="game">

<h3>🃏 Memory</h3>

<button onclick="memory()">Prova</button>

<p id="memory"></p>

</div>

</div>

<script>

/* SNAKE */

let sc=document.getElementById("snake").getContext("2d")

let sx=100
let sy=100

function startSnake(){

setInterval(()=>{

sc.clearRect(0,0,200,200)

sx+=10

if(sx>200)sx=0

sc.fillStyle="lime"

sc.fillRect(sx,sy,10,10)

},200)

}


/* PACMAN */

let pc=document.getElementById("pac").getContext("2d")

let px=100
let py=100

function startPac(){

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp")py-=10
if(e.key=="ArrowDown")py+=10
if(e.key=="ArrowLeft")px-=10
if(e.key=="ArrowRight")px+=10

pc.clearRect(0,0,200,200)

pc.beginPath()
pc.arc(px,py,10,0.2*Math.PI,1.8*Math.PI)
pc.lineTo(px,py)
pc.fillStyle="yellow"
pc.fill()

})

}


/* QUIZ */

let qs=["Capitale Italia?","5x5?","Chi ha scoperto America?"]

function quiz(){

document.getElementById("quiz").innerText=

qs[Math.floor(Math.random()*qs.length)]

}


/* NUMERO */

let secret=Math.floor(Math.random()*100)+1

function guess(){

let g=document.getElementById("guess").value

let r=""

if(g==secret)r="🎉 Giusto!"
else if(g>secret)r="⬇ Troppo alto"
else r="⬆ Troppo basso"

document.getElementById("numResult").innerText=r

}


/* BATTAGLIA */

let ship=Math.floor(Math.random()*16)

let grid=document.getElementById("grid")

for(let i=0;i<16;i++){

let c=document.createElement("div")

c.className="cell"

c.onclick=()=>{

if(i==ship){

c.style.background="red"

document.getElementById("battle").innerText="🚢 Colpita!"

}else{

c.style.background="blue"

}

}

grid.appendChild(c)

}


/* DADO */

function dice(){

document.getElementById("dice").innerText=

Math.floor(Math.random()*6)+1

}


/* TRIS */

let turn="X"

function play(b){

if(b.innerText==""){

b.innerText=turn

turn=turn=="X"?"O":"X"

}

}


/* REACTION */

function reaction(){

let t=Math.random()*2000

setTimeout(()=>{

let start=Date.now()

alert("CLICCA!")

let end=Date.now()

document.getElementById("react").innerText=(end-start)+" ms"

},t)

}


/* PERSONAGGIO */

let persons=["Messi","Einstein","Michael Jackson","Cristiano Ronaldo"]

function person(){

document.getElementById("person").innerText=

persons[Math.floor(Math.random()*persons.length)]

}


/* MEMORY */

function memory(){

let r=Math.random()

if(r>0.5){

document.getElementById("memory").innerText="✔ Coppia trovata"

}else{

document.getElementById("memory").innerText="✘ Riprova"

}

}

</script>

</body>
</html>
