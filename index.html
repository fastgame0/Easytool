<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyTool - Calcolatore Percentuale, BMI, Contatore Parole, Password e Tool Online Gratuiti</title>
<meta name="description" content="EasyTool: calcolatore percentuale, BMI, contatore parole, generatore password, convertitore valute e altri strumenti gratuiti online. Facile, veloce e gratuito.">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{margin:0;font-family:'Roboto',sans-serif;background:#e8f1ff;color:#1e293b}
header{background:linear-gradient(135deg,#2563eb,#06b6d4);color:white;text-align:center;padding:50px 20px}
header h1{margin:0;font-size:42px}
header p{margin-top:10px;font-size:18px}
nav{background:#1e3a8a;padding:12px;text-align:center;position:sticky;top:0}
nav a{color:white;margin:0 10px;text-decoration:none;font-weight:bold}
.container{max-width:1100px;margin:auto;padding:25px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:white;border-radius:14px;padding:20px;box-shadow:0 10px 20px rgba(0,0,0,0.08);transition:transform 0.3s, box-shadow 0.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 15px 25px rgba(0,0,0,0.15)}
.card h2{font-size:20px;margin-top:0;color:#1e40af;display:flex;align-items:center;gap:8px}
.card p{font-size:14px;color:#334155;margin-top:5px}
input,select,textarea{width:100%;padding:10px;margin-top:8px;border:1px solid #cbd5e1;border-radius:6px}
button{margin-top:10px;padding:10px;border:none;background:#2563eb;color:white;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px}
button:hover{background:#1d4ed8}
.result{margin-top:10px;font-weight:bold;color:#1e40af;transition:all 0.3s}
.result.show{transform:scale(1.05);color:#2563eb}
footer{background:#1e3a8a;color:white;text-align:center;padding:20px;margin-top:30px}
</style>
</head>
<body>

<header>
<h1><i class="fa-solid fa-toolbox"></i> EasyTool</h1>
<p>Collezione di strumenti online gratuiti e veloci con mini-guida per ogni tool</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="minigame.html">Minigame 🎮</a>
  <a href="#contatti">Contatti</a>
</nav>

</div>

<div class="container" id="contatti">
<div class="card">
<h2>Contatti</h2>
<p>onlytool</p>
</div>
</div>

<footer>
<p>© 2026 EasyTool</p>
</footer>

<script>
function showResult(id,text){let el=document.getElementById(id);el.innerText=text;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),800)}
function calcPerc(){let n=document.getElementById('num').value;let p=document.getElementById('perc').value;showResult('rPerc',n*p/100)}
function countWords(){let t=document.getElementById('text').value.trim();showResult('rWords',t==""?0:t.split(/\s+/).length)}
function genPass(){let l=document.getElementById('len').value;let c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";let p="";for(let i=0;i<l;i++){p+=c[Math.floor(Math.random()*c.length)]}showResult('rPass',p)}
function convMoney(){let v=document.getElementById('money').value;let t=document.getElementById('cur').value;let rate=1.1;showResult('rMoney',t=='e'?v*rate:v/rate)}
function calcBMI(){let p=document.getElementById('peso').value;let h=document.getElementById('altezza').value/100;showResult('rBMI',(p/(h*h)).toFixed(2))}
function calcAge(){let b=new Date(document.getElementById('birth').value);let diff=Date.now()-b.getTime();let age=new Date(diff);showResult('rAge',Math.abs(age.getUTCFullYear()-1970)+" anni")}
function countChars(){showResult('rChars',document.getElementById('chars').value.length)}
function convMeters(){let m=document.getElementById('meters').value;showResult('rMeters',(m*3.28084).toFixed(2)+" ft")}
function genUser(){let n=document.getElementById('name').value;let r=Math.floor(Math.random()*1000);showResult('rUser',n+r)}
function calcIVA(){let p=document.getElementById('price').value;showResult('rIVA',(p*1.22).toFixed(2))}
function convKG(){let kg=document.getElementById('kg').value;showResult('rKG',(kg*2.20462).toFixed(2)+" lb")}
function randNum(){let m=document.getElementById('max').value;showResult('rRand',Math.floor(Math.random()*m))}
</script>

</body>
</html>
